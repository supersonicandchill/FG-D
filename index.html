<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaos Calmer: Firegrounds & Dragons Edition 🔥🐉</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&family=Press+Start+2P&display=swap');

    :root {
      --accent: #ff6600;
      --dragon: #9f1239;
      --dark: #111111;
      --glass: rgba(255,255,255,0.08);
    }

    body {
      margin: 0;
      font-family: 'Inter', system_ui, sans-serif;
      background: linear-gradient(180deg, #111111, #1a1a1a);
      color: #eee;
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(159,18,57,0.25) 0%, transparent 60%),
                  radial-gradient(circle at 70% 80%, rgba(255,102,0,0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: subtlePulse 18s infinite ease-in-out;
    }

    @keyframes subtlePulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    #sidebar {
      width: 280px;
      background: rgba(20,20,20,0.96);
      backdrop-filter: blur(14px);
      padding: 20px;
      border-right: 2px solid var(--dragon);
      display: flex;
      flex-direction: column;
      box-shadow: 6px 0 25px rgba(159,18,57,0.3);
      z-index: 10;
    }

    #sidebar h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      margin: 0 0 4px;
      background: linear-gradient(90deg, #ff6600, #9f1239);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1.5px;
      text-shadow: 0 0 12px rgba(255,102,0,0.5);
    }

    #sidebar .tagline {
      font-family: 'Press Start 2P', sans-serif;
      font-size: 0.75rem;
      color: #ffddaa;
      margin-bottom: 20px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    .library {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      flex: 1;
    }

    .icon {
      aspect-ratio: 1;
      background: var(--glass);
      border: 3px solid rgba(255,102,0,0.4);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: #fff;
      cursor: grab;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 16px rgba(159,18,57,0.3);
      position: relative;
      overflow: hidden;
    }

    .icon:hover {
      transform: scale(1.12) rotate(6deg);
      border-color: #ffdd00;
      box-shadow: 0 16px 28px rgba(255,102,0,0.4);
    }

    .icon span {
      font-size: 0.68rem;
      font-weight: 700;
      margin-top: 8px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      background: rgba(20,20,20,0.96);
      backdrop-filter: blur(14px);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid var(--dragon);
      box-shadow: 0 4px 16px rgba(159,18,57,0.3);
    }

    button {
      background: rgba(255,102,0,0.15);
      color: #fff;
      border: 2px solid var(--accent);
      border-radius: 9999px;
      padding: 10px 22px;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(255,102,0,0.25);
    }

    button:hover {
      background: var(--accent);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 24px rgba(255,102,0,0.4);
    }

    .dice-btn {
      background: #9f1239;
      border-color: #ffdd00;
      animation: dicePulse 2s infinite;
    }

    @keyframes dicePulse {
      50% { transform: scale(1.1); }
    }

    #canvas-container {
      flex: 1;
      background: #0f1a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 90px rgba(159,18,57,0.25);
    }

    canvas {
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.7),
                  0 0 0 16px rgba(255,102,0,0.15);
    }

    #feedback, #narrative {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(17,17,17,0.94);
      backdrop-filter: blur(16px);
      color: #eee;
      padding: 18px 24px;
      border-radius: 20px;
      max-width: 380px;
      box-shadow: 0 12px 40px rgba(159,18,57,0.4);
      font-size: 0.95rem;
      line-height: 1.5;
      border: 3px solid #ffdd00;
      display: none;
      z-index: 20;
    }

    .narrative-header {
      color: #ffdd00;
      font-family: 'Press Start 2P', sans-serif;
      font-size: 0.85rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <h1>🔥🐉 Chaos Calmer</h1>
    <div class="tagline">Firegrounds &amp; Dragons Edition</div>
    <p style="margin:0 0 20px; opacity:0.8; font-size:0.9rem;">Slay the Chaos Dragon • Master the Quest • Calm the Fireground<br><small>Based on Mastering Fireground Command by Anthony Kastros</small></p>

    <div class="library" id="library"></div>

    <div style="margin-top: 24px; padding-top: 24px; border-top: 2px solid rgba(255,221,0,0.3);">
      <h3 style="margin:0 0 12px; font-size:1rem; opacity:0.9;">Quest Maps</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button onclick="loadScene('house')" style="flex:1"><i class="fas fa-dungeon"></i> Burning Dungeon (House)</button>
        <button onclick="loadScene('apartment')" style="flex:1"><i class="fas fa-castle"></i> Tower of Trials (Apartment)</button>
        <button onclick="loadScene('commercial')" style="flex:1"><i class="fas fa-dragon"></i> Dragon’s Hoard (Commercial)</button>
      </div>
    </div>
  </div>

  <div id="main">
    <!-- Toolbar -->
    <div id="toolbar">
      <button onclick="clearCanvas()"><i class="fas fa-skull"></i> Clear Battlefield</button>
      <button onclick="runSimulation()"><i class="fas fa-dice"></i> Roll Initiative</button>
      <button onclick="rollForChaos()" class="dice-btn"><i class="fas fa-dice-d20"></i> Roll d20 for Chaos</button>
      
      <button onclick="activateTool('hose')"><i class="fas fa-water"></i> Cast Hose Spell</button>
      <button onclick="activateTool('ladder')"><i class="fas fa-ladder"></i> Summon Ladder</button>

      <div style="flex:1"></div>

      <div class="toggle">
        <span>🎙️ Epic Sounds</span>
        <label class="switch">
          <input type="checkbox" id="soundToggle" checked onchange="toggleSounds()">
          <span class="slider"></span>
        </label>
      </div>

      <button onclick="showHelp()"><i class="fas fa-book-open"></i> Quest Log (Book)</button>
    </div>

    <!-- Canvas -->
    <div id="canvas-container">
      <canvas id="canvas" width="1100" height="660"></canvas>
      <div id="feedback"></div>
      <div id="narrative"></div>
    </div>
  </div>

<script>
// ==================== AUDIO + D&D FLAIR ====================
let audioContext;
let soundEnabled = true;

function initAudio() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

function playSiren() {
  if (!soundEnabled || !audioContext) return;
  initAudio();
  const osc = audioContext.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(280, audioContext.currentTime);
  const gain = audioContext.createGain();
  gain.gain.value = 0.45;
  osc.connect(gain).connect(audioContext.destination);
  osc.start();
  let dir = 1;
  const wail = setInterval(() => {
    const f = osc.frequency.value;
    osc.frequency.setValueAtTime(Math.max(220, Math.min(650, f + dir * 160)), audioContext.currentTime);
    if (f > 600 || f < 240) dir *= -1;
  }, 90);
  setTimeout(() => { clearInterval(wail); osc.stop(); }, 1300);
}

function playBrakeScreech() {
  if (!soundEnabled || !audioContext) return;
  initAudio();
  const bufferSize = audioContext.sampleRate * 1.6;
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const output = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) output[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  const noise = audioContext.createBufferSource();
  noise.buffer = buffer;
  const filter = audioContext.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(1400, audioContext.currentTime);
  const gain = audioContext.createGain();
  gain.gain.setValueAtTime(0.7, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.6);
  noise.connect(filter).connect(gain).connect(audioContext.destination);
  noise.start();
}

function playDiceRoll() {
  if (!soundEnabled || !audioContext) return;
  initAudio();
  const osc = audioContext.createOscillator();
  osc.frequency.setValueAtTime(120 + Math.random() * 300, audioContext.currentTime);
  const gain = audioContext.createGain();
  gain.gain.setValueAtTime(0.8, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.8);
  osc.connect(gain).connect(audioContext.destination);
  osc.start();
}

// ==================== FABRIC CANVAS ====================
const canvas = new fabric.Canvas('canvas', {
  width: 1100,
  height: 660,
  backgroundColor: '#0f1a0f',
  preserveObjectStacking: true,
  selection: false
});

let currentTool = null;
let drawingLine = null;

// D&D-themed library (still 100% fireground)
const iconsData = [
  { type: 'engine', emoji: '🚒', label: 'Dragon-Slayer Engine' },
  { type: 'truck', emoji: '🪜', label: 'Ladder Paladin' },
  { type: 'medic', emoji: '🚑', label: 'Cleric Medic' },
  { type: 'command', emoji: '👑', label: 'Paladin Commander' },
  { type: 'division', emoji: '🛡️', label: 'Div A Guardian' },
  { type: 'division', emoji: '🛡️', label: 'Div B Guardian' },
  { type: 'victim-low', emoji: '🟢', label: 'Low-Risk Peasant' },
  { type: 'victim-mod', emoji: '🟡', label: 'Mod-Risk Villager' },
  { type: 'victim-high', emoji: '🟠', label: 'High-Risk Noble' },
  { type: 'victim-confirmed', emoji: '🔴', label: 'Confirmed Rescue' },
  { type: 'fire', emoji: '🐉', label: 'Chaos Dragon' },
  { type: 'vent', emoji: '🌬️', label: 'Vent Wizard' },
  { type: 'ric', emoji: '🛡️', label: 'RIC Rapid Response' }
];

const libraryEl = document.getElementById('library');
iconsData.forEach(item => {
  const div = document.createElement('div');
  div.className = 'icon';
  div.setAttribute('data-type', item.type);
  div.innerHTML = `${item.emoji}<span>${item.label}</span>`;
  div.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', item.type);
    if (['engine','truck','medic'].includes(item.type)) playSiren();
  });
  libraryEl.appendChild(div);
});

// Drop handler with D&D bounce
const container = document.getElementById('canvas-container');
container.addEventListener('dragover', e => e.preventDefault());
container.addEventListener('drop', e => {
  e.preventDefault();
  const type = e.dataTransfer.getData('text/plain');
  const rect = canvas.getElement().getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  let obj;
  const baseProps = { left: x, top: y, selectable: true, hasControls: true };

  if (type.includes('victim')) {
    const colors = { low: '#22c55e', mod: '#eab308', high: '#f97316', confirmed: '#ef4444' };
    const key = type.split('-')[1] || 'low';
    obj = new fabric.Circle(Object.assign(baseProps, {
      radius: 24, fill: colors[key], stroke: '#ffdd00', strokeWidth: 5, label: type.toUpperCase()
    }));
  } else if (type === 'fire') {
    obj = new fabric.Text('🐉', Object.assign(baseProps, { fontSize: 58, label: 'CHAOS DRAGON' }));
  } else {
    const emoji = iconsData.find(i => i.type === type)?.emoji || '🔥';
    obj = new fabric.Text(emoji, Object.assign(baseProps, { fontSize: 52, label: type.toUpperCase() }));
  }

  obj.scale(0.2);
  canvas.add(obj);
  playBrakeScreech();

  obj.animate({ scaleX: 1, scaleY: 1 }, {
    duration: 320,
    onChange: canvas.renderAll.bind(canvas),
    easing: fabric.util.ease.easeOutElastic
  });
  canvas.setActiveObject(obj);
});

// Tool drawing (Hose & Ladder "spells")
canvas.on('mouse:down', function (opt) {
  if (!currentTool) return;
  const pointer = canvas.getPointer(opt.e);
  let target = null;
  canvas.getObjects().forEach(obj => {
    if (!obj.label) return;
    const isEngine = currentTool === 'hose' && obj.label.includes('ENGINE');
    const isTruck = currentTool === 'ladder' && obj.label.includes('TRUCK');
    if (isEngine || isTruck) {
      const dist = Math.hypot(obj.left - pointer.x, obj.top - pointer.y);
      if (dist < 90) target = obj;
    }
  });

  if (target) {
    const offsetX = currentTool === 'hose' ? 45 : 35;
    const offsetY = currentTool === 'hose' ? 25 : 45;
    const startX = target.left + offsetX;
    const startY = target.top + offsetY;

    drawingLine = new fabric.Line([startX, startY, pointer.x, pointer.y], {
      stroke: currentTool === 'hose' ? '#ff5500' : '#ffdd00',
      strokeWidth: currentTool === 'hose' ? 16 : 10,
      strokeDashArray: currentTool === 'ladder' ? [10, 5] : null,
      strokeLineCap: 'round',
      label: currentTool.toUpperCase() + ' SPELL',
      selectable: true
    });
    canvas.add(drawingLine);
  }
});

canvas.on('mouse:move', function (opt) {
  if (drawingLine) {
    const pointer = canvas.getPointer(opt.e);
    drawingLine.set({ x2: pointer.x, y2: pointer.y });
    canvas.renderAll();
  }
});

canvas.on('mouse:up', function () {
  if (drawingLine) {
    drawingLine.setCoords();
    drawingLine = null;
    currentTool = null;
    canvas.defaultCursor = 'default';
  }
});

function activateTool(tool) {
  currentTool = tool;
  canvas.defaultCursor = 'crosshair';
}

// ==================== D&D SCENES & NARRATIVE ====================
function loadScene(scene) {
  canvas.clear();
  let title = '';
  let color = '#0f1a0f';

  if (scene === 'house') {
    color = '#223311';
    title = 'Quest 1: The Burning Dungeon (Single-Family)';
  } else if (scene === 'apartment') {
    color = '#112233';
    title = 'Quest 2: Tower of Trials (Center-Hall Apartment)';
  } else if (scene === 'commercial') {
    color = '#442211';
    title = 'Quest 3: Dragon’s Hoard (Commercial Strip)';
  }

  canvas.setBackgroundColor(color, canvas.renderAll.bind(canvas));

  const building = new fabric.Rect({
    left: 170, top: 80, width: 760, height: 500,
    fill: 'transparent', stroke: '#ffddaa', strokeWidth: 18, rx: 18, ry: 18
  });
  canvas.add(building);

  const questText = new fabric.Text(title, {
    left: 210, top: 22, fontSize: 26, fill: '#ffddaa', fontFamily: 'Press Start 2P', shadow: '3px 3px 10px #000'
  });
  canvas.add(questText);
}

// ==================== D&D SIMULATION + DICE (tied to Kastros principles) ====================
function rollD20(modifier = 0) {
  playDiceRoll();
  return Math.floor(Math.random() * 20) + 1 + modifier;
}

function runSimulation() {
  const objects = canvas.getObjects();
  let hasCommand = false;
  let victimCount = 0;
  let dragonSlain = false;

  objects.forEach(obj => {
    const lbl = (obj.label || '').toUpperCase();
    if (lbl.includes('COMMAND') || lbl.includes('PALADIN')) hasCommand = true;
    if (lbl.includes('VICTIM')) victimCount++;
    if (lbl.includes('ENGINE') || lbl.includes('DRAGON')) dragonSlain = true;
  });

  const initiativeRoll = rollD20(hasCommand ? 4 : 0); // +4 Tactical Gap / Command bonus from Kastros

  let feedbackHTML = `
    <div class="narrative-header"><i class="fas fa-dice-d20"></i> INITIATIVE ROLL: <strong>${initiativeRoll}</strong></div>
    <p><strong>The Chaos Dragon stirs...</strong></p>
  `;

  if (initiativeRoll >= 15) {
    feedbackHTML += `<p style="color:#22c55e">🌟 Critical Success! Your FPODP size-up was legendary (Kastros Ch. 5). The party advances!</p>`;
  } else if (initiativeRoll >= 10) {
    feedbackHTML += `<p>✅ Solid roll. Tactical Gap bridged — crews are in position.</p>`;
  } else {
    feedbackHTML += `<p style="color:#ffcc00">⚠️ The Dragon breathes fire! Re-roll with better Command Post placement.</p>`;
  }

  if (victimCount > 0) feedbackHTML += `<p>👤 ${victimCount} civilians rescued — SIGNAL method applied like a true Cleric! (Species, Incapacity, Gender, Number, Age, Location)</p>`;
  if (dragonSlain) feedbackHTML += `<p>🐉 Chaos Dragon defeated! Aggressive life-safety tactics unlocked (Book Ch. 6).</p>`;

  feedbackHTML += `<p style="margin-top:12px; font-size:0.85rem; opacity:0.8">XP Gained: ${Math.floor(Math.random()*30 + 20)} • Next level: Master FPODP & Ten Commandments</p>`;

  const fb = document.getElementById('feedback');
  fb.innerHTML = feedbackHTML;
  fb.style.display = 'block';
  setTimeout(() => { fb.style.display = 'none'; }, 8500);
}

function rollForChaos() {
  const roll = rollD20();
  const narrative = document.getElementById('narrative');
  
  let text = `<div class="narrative-header"><i class="fas fa-dice-d20"></i> CHAOS ROLL: <strong>${roll}</strong></div>`;
  
  if (roll >= 18) text += `<p>🌟 The gods smile! Perfect wind shift — ventilation spell succeeds automatically.</p>`;
  else if (roll >= 13) text += `<p>✅ Random event: Mayday call — but your RIC team is already in position. Good call!</p>`;
  else if (roll >= 8) text += `<p>⚔️ Minor complication: Fire doubles in size. Apply RECEO-VS immediately!</p>`;
  else text += `<p>💥 Critical Chaos! Flashover imminent. Pull back and re-size-up per Kastros Ten Commandments.</p>`;

  narrative.innerHTML = text;
  narrative.style.display = 'block';
  setTimeout(() => { narrative.style.display = 'none'; }, 7000);
}

// ==================== UTILITIES ====================
function clearCanvas() {
  if (confirm('Reset the battlefield and begin a new quest?')) {
    canvas.clear();
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('narrative').style.display = 'none';
  }
}

function toggleSounds() {
  soundEnabled = document.getElementById('soundToggle').checked;
}

function showHelp() {
  alert(`🎲 FIREGROUNDS & DRAGONS EDITION\n\n` +
        `• Drag your heroes onto the battlefield\n` +
        `• Roll d20 for Initiative & Chaos events\n` +
        `• Cast Hose & Ladder spells from your rigs\n` +
        `• Earn XP by applying real Kastros principles (FPODP, SIGNAL, Tactical Gap, Ten Commandments)\n\n` +
        `This is 100% based on Mastering Fireground Command — just with D&D storytelling, dice, and epic flair.\n\n` +
        `Share this link with your crew: https://YOURUSERNAME.github.io/YOUR-REPO-NAME/\n\n` +
        `Ready to level up? Paste this file into Claude and tell it what to add next from your book!`);
}

// Start the quest
window.onload = () => {
  loadScene('house');
  console.log('%c🐉 Firegrounds & Dragons Edition ready — roll for fun and training!', 'background:#9f1239;color:#ffdd00;padding:6px 12px;border-radius:9999px;font-weight:700');
};
</script>
</body>
</html>
